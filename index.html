<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Найди пару — v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Экран меню -->
    <div id="screen-menu" class="screen active">
        <h1>Найди пару</h1>

        <div class="settings-group">
            <label class="settings-label">Сложность</label>
            <div class="options-row">
                <label><input type="radio" name="difficulty" value="easy"> Легко (8 карт)</label>
                <label><input type="radio" name="difficulty" value="normal" checked> Нормально (16 карт)</label>
                <label><input type="radio" name="difficulty" value="hard"> Сложно (24 карты)</label>
            </div>
        </div>

        <div class="settings-group">
            <label class="settings-label">Режим</label>
            <div class="options-row">
                <label><input type="radio" name="mode" value="free" checked> Свободный</label>
                <label><input type="radio" name="mode" value="timed"> На время</label>
            </div>
        </div>

        <button id="btn-start">Начать игру</button>
    </div>

    <!-- Экран игры -->
    <div id="screen-game" class="screen">
        <div class="hud">
            <span id="hud-moves">Ходов: 0</span>
            <button id="btn-menu">В меню</button>
            <span id="hud-timer">00:00</span>
        </div>
        <div id="game-board" class="board"></div>
    </div>

    <!-- Экран результата -->
    <div id="screen-result" class="screen">
        <h2 id="result-title"></h2>
        <p id="result-time"></p>
        <p id="result-moves"></p>
        <p id="result-stars"></p>
        <button id="btn-play-again">Играть снова</button>
        <button id="btn-to-menu">В главное меню</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
